<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGO特质测试 | 探索你的内在特质</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="home-page" class="page active">
            <div class="logo">
                <i class="fas fa-brain"></i>
            </div>
            <h1>EGO特质测试</h1>
            <p class="subtitle">通过11道精心设计的题目，探索你内心深处的EGO特质。本测试基于七种特质理论，从多个维度分析你的性格倾向，帮助你更好地了解自己。</p>
            
            <div class="features">
                <div class="feature">
                    <i class="fas fa-clock"></i>
                    <h3>快速测试</h3>
                    <p>只需2-3分钟即可完成全部11道题目</p>
                </div>
                <div class="feature">
                    <i class="fas fa-chart-pie"></i>
                    <h3>制作者声明</h3>
                    <p>仅用于娱乐，请勿过度解读，由于个人精力有限，部分人格未做独特图文区分，敬请谅解</p>
                </div>
                <div class="feature">
                    <i class="fas fa-user-check"></i>
                    <h3>制作者</h3>
                    <p>B站不渝M4U</p>
                </div>
            </div>
            
            <button class="start-btn" id="start-test" onclick="startTest()">
                <i class="fas fa-play-circle"></i> 开始测试
            </button>
            
            <div class="footer">
                <p>本测试结果仅供娱乐，不代表专业心理评估</p>
            </div>
        </div>
        
        <div id="quiz-page" class="page" style="display: none;">
            <div class="quiz-header">
                <h2>EGO特质测试</h2>
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="question-counter">
                    <span id="current-question">0</span> / 11
                </div>
            </div>
            
            <div class="quiz-content">
                <div class="question-container">
                    <div class="question-number">问题 <span id="question-num">-</span></div>
                    <div class="question-text" id="question-text">点击「开始测试」加载题目</div>
                    
                    <div class="options-container" id="options-container">
                        <!-- 选项将动态生成 -->
                    </div>
                </div>
                
                <div class="navigation-buttons">
                    <button class="nav-btn prev-btn" id="prev-btn" onclick="prevQuestion()" style="display: none;">
                        <i class="fas fa-arrow-left"></i> 上一题
                    </button>
                    <button class="nav-btn next-btn" id="next-btn" onclick="nextQuestion()">
                        下一题 <i class="fas fa-arrow-right"></i>
                    </button>
                    <button class="nav-btn submit-btn" id="submit-btn" onclick="showResult()" style="display: none;">
                        <i class="fas fa-check-circle"></i> 查看结果
                    </button>
                </div>
            </div>
        </div>
        
        <div id="result-page" class="page" style="display: none;">
            <div class="result-header">
                <h2>你的测试结果</h2>
                <p class="result-score">总分: <span id="total-score">0</span></p>
            </div>
            
            <div class="result-content">
                <div class="traits-container">
                    <h3>EGO特质分析</h3>
                    <div class="traits-grid" id="traits-grid">
                    </div>
                </div>
                
                <div class="chart-container">
                    <h3>特质分布图</h3>
                    <div class="chart" id="chart">
                    </div>
                </div>
            </div>
            
            <div class="personality-description">
                <h3>人格类型: <span id="personality-type" class="personality-type-text">未确定</span></h3>
                <div class="personality-image-container" id="personality-image-container">
                    <img id="personality-image" alt="人格类型图片">
                </div>
                <p id="personality-description"></p>
            </div>
            
            <div class="actions">
                <button class="action-btn restart-btn" id="restart-btn" onclick="restartTest()">
                    <i class="fas fa-redo"></i> 重新测试
                </button>
                <button class="action-btn home-btn" id="back-home-btn" onclick="backToHome()">
                    <i class="fas fa-home"></i> 返回首页
                </button>
            </div>
            
            <div class="footer">
                <p>本测试基于特质理论，结果仅供参考，不代表专业心理评估</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
