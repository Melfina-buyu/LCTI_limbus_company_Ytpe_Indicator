<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGO特质测试 | 探索你的内在特质</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        :root {
            --primary: #6c63ff;
            --primary-light: #8a84ff;
            --secondary: #ff6b9d;
            --secondary-light: #ff9ac2;
            --accent: #36d1dc;
            --dark: #2a2d43;
            --light: #f8f9ff;
            --gray: #e0e3ff;
            --shadow: 0 10px 30px rgba(108, 99, 255, 0.15);
            --transition: all 0.3s ease;
        }
        
        body {
            background-color: #f0f2ff;
            color: var(--dark);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .page {
            display: none;
            background-color: white;
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            min-height: 600px;
        }
        
        .page.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        #home-page {
            padding: 60px 40px;
            text-align: center;
        }
        
        .logo {
            color: var(--primary);
            font-size: 3.5rem;
            margin-bottom: 20px;
        }
        
        h1 {
            color: var(--dark);
            font-size: 3rem;
            margin-bottom: 15px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #666;
            max-width: 700px;
            margin: 0 auto 40px;
            line-height: 1.6;
        }
        
        .features {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 50px;
        }
        
        .feature {
            background-color: var(--light);
            border-radius: 15px;
            padding: 25px 20px;
            width: 200px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: var(--transition);
        }
        
        .feature:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .feature i {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 15px;
        }
        
        .feature h3 {
            margin-bottom: 10px;
            color: var(--dark);
        }
        
        .start-btn {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.3rem;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 8px 20px rgba(108, 99, 255, 0.3);
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        .start-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(108, 99, 255, 0.4);
        }
        
        #quiz-page {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .quiz-header {
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            color: white;
            padding: 25px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .quiz-header h2 {
            font-size: 1.8rem;
        }
        
        .progress-container {
            width: 300px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            height: 12px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background-color: white;
            width: 5%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        
        .quiz-content {
            padding: 40px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        .question-container {
            flex-grow: 1;
        }
        
        .question-number {
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .question-text {
            font-size: 1.8rem;
            line-height: 1.4;
            margin-bottom: 40px;
            color: var(--dark);
        }
        
        .options-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .option {
            border: 2px solid var(--gray);
            border-radius: 15px;
            padding: 25px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
        }
        
        .option:hover {
            border-color: var(--primary-light);
            background-color: rgba(108, 99, 255, 0.05);
        }
        
        .option.selected {
            border-color: var(--primary);
            background-color: rgba(108, 99, 255, 0.1);
            box-shadow: 0 5px 15px rgba(108, 99, 255, 0.1);
        }
        
        .option-text {
            font-size: 1.2rem;
            line-height: 1.5;
        }
        
        .option-radio {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--primary-light);
            margin-right: 20px;
            flex-shrink: 0;
            position: relative;
        }
        
        .option.selected .option-radio::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: var(--primary);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .navigation-buttons {
            display: flex;
            justify-content: space-between;
        }
        
        .nav-btn {
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-weight: bold;
        }
        
        .prev-btn {
            background-color: var(--light);
            color: var(--dark);
        }
        
        .prev-btn:hover {
            background-color: var(--gray);
        }
        
        .next-btn {
            background-color: var(--primary);
            color: white;
        }
        
        .next-btn:hover {
            background-color: var(--primary-light);
        }
        
        .submit-btn {
            background: linear-gradient(90deg, var(--secondary), #ff8aae);
            color: white;
        }
        
        .submit-btn:hover {
            background: linear-gradient(90deg, var(--secondary-light), #ffa5c2);
        }
        
        #result-page {
            padding: 40px;
        }
        
        .result-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .result-header h2 {
            font-size: 2.5rem;
            color: var(--dark);
            margin-bottom: 10px;
        }
        
        .result-score {
            font-size: 1.3rem;
            color: var(--primary);
            font-weight: bold;
        }
        
        .result-content {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            margin-bottom: 40px;
        }
        
        .traits-container {
            flex: 1;
            min-width: 300px;
        }
        
        .traits-container h3 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--dark);
        }
        
        .traits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .trait-item {
            background-color: var(--light);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
        }
        
        .trait-item.active {
            background-color: rgba(108, 99, 255, 0.1);
            border: 2px solid var(--primary);
        }
        
        .trait-name {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .trait-value {
            font-size: 1.1rem;
            color: var(--primary);
        }
        
        .trait-normalized {
            font-size: 0.9rem;
            color: #666;
        }
        
        .chart-container {
            flex: 1;
            min-width: 300px;
        }
        
        .chart-container h3 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--dark);
        }
        
        .chart {
            height: 300px;
            background-color: var(--light);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
        }
        
        .bar {
            width: 40px;
            background: linear-gradient(to top, var(--primary), var(--primary-light));
            border-radius: 5px 5px 0 0;
            position: relative;
        }
        
        .bar-label {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            color: var(--dark);
        }
        
        .bar-value {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            color: var(--primary);
        }
        
        .personality-description {
            background-color: var(--light);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .personality-description h3 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: var(--dark);
        }
        
        .personality-image-container {
            text-align: center;
            margin: 20px 0;
        }
        
        #personality-image {
            max-width: 300px;
            max-height: 200px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 3px solid var(--primary-light);
            object-fit: cover;
        }
        
        .personality-description p {
            line-height: 1.6;
            font-size: 1.1rem;
        }
        
        .actions {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        
        .action-btn {
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-weight: bold;
        }
        
        .restart-btn {
            background-color: var(--primary);
            color: white;
        }
        
        .restart-btn:hover {
            background-color: var(--primary-light);
        }
        
        .home-btn {
            background-color: var(--light);
            color: var(--dark);
            border: 2px solid var(--primary);
        }
        
        .home-btn:hover {
            background-color: var(--gray);
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #888;
            font-size: 0.9rem;
        }
        
        .special-type {
            color: #ff0000;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @media (max-width: 768px) {
            .options-container {
                grid-template-columns: 1fr;
            }
            
            .quiz-header {
                flex-direction: column;
                gap: 15px;
            }
            
            .progress-container {
                width: 100%;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .question-text {
                font-size: 1.5rem;
            }
            
            .features {
                flex-direction: column;
                align-items: center;
            }
            
            .feature {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>

                text: "我想和所有人分享自己的想法!",
                options: [
                    { text: "你会认可我吗🥹", value: 1100 },
                    { text: "快来和我玩!Ryoshu!", value: 1000 },
                    { text: "我...我想...我还是一个人呆着吧...", value: 10000 },
                    { text: "想法就是想法喽", value: 0 },
                    { text: "我等只是在讨论学术罢了...", value: 1100 }
                ]
            },
            {
                id: 9,
                text: "我希望能够有人理解我...",
                options: [
                    { text: "我只是想和你们大家一起……埋葬在花香中……", value: 11000 },
                    { text: "我将穷极一生来寻找这样的人", value: 1000 },
                    { text: "苦痛啊,你是我的唯一", value: 10000 },
                    { text: "我就是我喽", value: 0 },
                    { text: "无所谓,吾将贯彻此道", value: 100 }
                ]
            },
            {
                id: 10,
                text: "你可曾因被撺夺事物而对他人感到不满?(例如:抢票恰好售空,喜欢的人被人抢走,限定周边没抢到,抽卡就你没出,公司任务(学校小组作业)全权由你完成......)",
                options: [
                    { text: "命运何其弄人?!", value: 100010 },
                    { text: "苦痛啊,除了你...", value: 10000 },
                    { text: "篡夺就是篡夺咯", value: 0 },
                    { text: "时运不济罢了", value: 100 },
                    { text: "命里有时终须有,命里无时莫方求", value: 0 }
                ]
            },
            {
                id: 11,
                text: "你重要的人即将离开你时?(对方主观意志所导致的)",
                options: [
                    { text: "友人呐...若是我这次放你离开..想必你便再也不会回来了吧...", value: 10000 },
                    { text: "说拜拜就拜拜~", value: 0 },
                    { text: "我不理解,但会尊重", value: 0 },
                    { text: "凭什么,你要离开我!", value: 100010 },
                    { text: "圣光背弃了我!", value: 110 }
                ]
            }
        ];

        let currentQuestion = 0;
        let userAnswers = new Array(questions.length).fill(null);
        let totalScore = 0;
        let traitScores = {
            1: 0, 10: 0, 100: 0, 1000: 0, 10000: 0, 100000: 0
        };
        let normalizedTraitScores = {
            1: 0, 10: 0, 100: 0, 1000: 0, 10000: 0, 100000: 0
        };

        const homePage = document.getElementById('home-page');
        const quizPage = document.getElementById('quiz-page');
        const resultPage = document.getElementById('result-page');
        const startTestBtn = document.getElementById('start-test');
        const progressBar = document.getElementById('progress-bar');
        const currentQuestionElement = document.getElementById('current-question');
        const questionNumElement = document.getElementById('question-num');
        const questionTextElement = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const submitBtn = document.getElementById('submit-btn');
        const totalScoreElement = document.getElementById('total-score');
        const traitsGrid = document.getElementById('traits-grid');
        const chartElement = document.getElementById('chart');
        const personalityTypeElement = document.getElementById('personality-type');
        const personalityDescriptionElement = document.getElementById('personality-description');
        const restartBtn = document.getElementById('restart-btn');
        const backHomeBtn = document.getElementById('back-home-btn');
        const personalityImage = document.getElementById('personality-image');
        const imageContainer = document.getElementById('personality-image-container');

        document.addEventListener('DOMContentLoaded', function() {
            showQuestion(currentQuestion);
            
            startTestBtn.addEventListener('click', startTest);
            prevBtn.addEventListener('click', prevQuestion);
            nextBtn.addEventListener('click', nextQuestion);
            submitBtn.addEventListener('click', showResult);
            restartBtn.addEventListener('click', restartTest);
            backHomeBtn.addEventListener('click', backToHome);
        });

        function startTest() {
            homePage.classList.remove('active');
            quizPage.classList.add('active');
            resultPage.classList.remove('active');
            
            currentQuestion = 0;
            userAnswers = new Array(questions.length).fill(null);
            showQuestion(currentQuestion);
        }

        function showQuestion(index) {
            const question = questions[index];
            questionNumElement.textContent = index + 1;
            currentQuestionElement.textContent = index + 1;
            questionTextElement.textContent = question.text;
            
            const progress = ((index + 1) / questions.length) * 100;
            progressBar.style.width = `${progress}%`;
            
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, optionIndex) => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                if (userAnswers[index] === optionIndex) {
                    optionElement.classList.add('selected');
                }
                
                optionElement.innerHTML = `
                    <div class="option-radio"></div>
                    <div class="option-text">${option.text}</div>
                `;
                
                optionElement.addEventListener('click', () => selectOption(optionIndex));
                optionsContainer.appendChild(optionElement);
            });
            
            prevBtn.style.display = index === 0 ? 'none' : 'block';
            
            if (index === questions.length - 1) {
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'block';
            } else {
                nextBtn.style.display = 'block';
                submitBtn.style.display = 'none';
            }
        }

        function selectOption(optionIndex) {
            userAnswers[currentQuestion] = optionIndex;
            
            const options = document.querySelectorAll('.option');
            options.forEach((option, index) => {
                if (index === optionIndex) {
                    option.classList.add('selected');
                } else {
                    option.classList.remove('selected');
                }
            });
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion(currentQuestion);
            }
        }

        function nextQuestion() {
            if (userAnswers[currentQuestion] === null) {
                alert('请选择一个选项');
                return;
            }
            
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion(currentQuestion);
            }
        }

        function calculateScores() {
            totalScore = 0;
            traitScores = { 1: 0, 10: 0, 100: 0, 1000: 0, 10000: 0, 100000: 0 };
            normalizedTraitScores = { 1: 0, 10: 0, 100: 0, 1000: 0, 10000: 0, 100000: 0 };
            
            const traitMaxValues = { 1: 0, 10: 0, 100: 0, 1000: 0, 10000: 0, 100000: 0 };
            
            questions.forEach((question, index) => {
                const answerIndex = userAnswers[index];
                if (answerIndex !== null) {
                    const optionValue = question.options[answerIndex].value;
                    totalScore += optionValue;
                    
                    Object.keys(traitScores).forEach(trait => {
                        const traitNum = parseInt(trait);
                        if (optionValue % (traitNum * 10) >= traitNum) {
                            traitScores[traitNum] += traitNum;
                            normalizedTraitScores[traitNum] += 1;
                        }
                    });
                    
                    let maxValuesForQuestion = { 1: 0, 10: 0, 100: 0, 1000: 0, 10000: 0, 100000: 0 };
                    
                    question.options.forEach(option => {
                        const value = option.value;
                        Object.keys(maxValuesForQuestion).forEach(trait => {
                            const traitNum = parseInt(trait);
                            if (value % (traitNum * 10) >= traitNum) {
                                maxValuesForQuestion[traitNum] = 1;
                            }
                        });
                    });
                    
                    Object.keys(traitMaxValues).forEach(trait => {
                        const traitNum = parseInt(trait);
                        traitMaxValues[traitNum] += maxValuesForQuestion[traitNum];
                    });
                }
            });
            
            const activeTraits = {};
            Object.keys(normalizedTraitScores).forEach(trait => {
                const traitNum = parseInt(trait);
                const maxValue = traitMaxValues[traitNum];
                const threshold = maxValue / 2;
                activeTraits[traitNum] = normalizedTraitScores[traitNum] >= threshold;
            });
            
            return activeTraits;
        }

        function showResult() {
            if (userAnswers[currentQuestion] === null) {
                alert('请选择一个选项');
                return;
            }
            
            const activeTraits = calculateScores();
            
            quizPage.classList.remove('active');
            resultPage.classList.add('active');
            
            totalScoreElement.textContent = totalScore;
            
            traitsGrid.innerHTML = '';
            Object.keys(TRAITS).forEach(traitKey => {
                const trait = TRAITS[traitKey];
                const traitNum = parseInt(traitKey);
                const isActive = activeTraits[traitNum];
                const normalizedScore = normalizedTraitScores[traitNum];
                
                const traitElement = document.createElement('div');
                traitElement.className = `trait-item ${isActive ? 'active' : ''}`;
                traitElement.innerHTML = `
                    <div class="trait-name">${trait.name}</div>
                    <div class="trait-value">出现次数: ${normalizedScore}</div>
                    <div class="trait-normalized">原始得分: ${traitScores[traitNum]}</div>
                    <div>${isActive ? '✓ 显著' : '○ 不显著'}</div>
                `;
                traitsGrid.appendChild(traitElement);
            });
            
            chartElement.innerHTML = '';
            const maxNormalizedScore = Math.max(...Object.values(normalizedTraitScores));
            
            Object.keys(TRAITS).forEach(traitKey => {
                const trait = TRAITS[traitKey];
                const traitNum = parseInt(traitKey);
                const score = normalizedTraitScores[traitNum];
                
                const height = maxNormalizedScore > 0 ? (score / maxNormalizedScore) * 220 : 0;
                
                const barElement = document.createElement('div');
                barElement.className = 'bar';
                barElement.style.height = `${height}px`;
                barElement.style.background = `linear-gradient(to top, ${trait.color}, ${trait.color}99)`;
                barElement.innerHTML = `
                    <div class="bar-value">${score}</div>
                    <div class="bar-label">${trait.name}</div>
                `;
                chartElement.appendChild(barElement);
            });
            
            let personalityType = "平衡型";
            let description = "你的EGO特质比较均衡，没有特别突出的特质。";
            
            // 彩蛋：当总分为0时，显示"地狱鸡"人格类型
            if (totalScore === 0) {
                personalityType = "地狱鸡";
                description = "恭喜你触发了隐藏彩蛋！你是传说中的地狱鸡人格！这是一种极其罕见的人格类型，代表着你超越了所有人格特质的束缚，达到了无我无相的境界。你既不是欲望的奴隶，也不是忧郁的俘虏，你就是你，独一无二的存在！";
                
                // 为地狱鸡人格添加特殊样式
                personalityTypeElement.classList.add("special-type");
            } else {
                personalityTypeElement.classList.remove("special-type");
                
                const activeTraitNames = Object.keys(activeTraits)
                    .filter(traitKey => activeTraits[traitKey])
                    .map(traitKey => TRAITS[traitKey].name);
                
                if (activeTraitNames.length === 0) {
                    personalityType = "均衡型";
                    description = "你的EGO特质非常均衡，没有特别突出的倾向。你在不同情境下能够展现出不同的特质，具有很好的适应性。";
                } else if (activeTraitNames.length === 1) {
                    personalityType = `${activeTraitNames[0]}主导型`;
                    description = `${activeTraitNames[0]}特质在你的人格中占据主导地位。`;
                    
                    if (activeTraitNames[0] === "欲望") {
                        description = "你是一个充满欲望和动力的人，对目标有强烈的追求，不轻易满足于现状。你有明确的人生方向，并且会为之不懈努力。";
                    } else if (activeTraitNames[0] === "忧郁") {
                        description = "你带有忧郁气质，对生活和情感有深刻的体验和思考。你可能会时常反思，对事物的感受比较深刻。";
                    } else if (activeTraitNames[0] === "傲慢") {
                        description = "你具有自信和自尊心较强的特质，有时可能表现出一定的优越感。你相信自己的能力，不轻易向困难低头。";
                    } else if (activeTraitNames[0] === "嫉妒") {
                        description = "你对他人的成功和优势比较敏感，有时会产生比较心理。这也可以转化为你追求进步的动力。";
                    } else if (activeTraitNames[0] === "暴怒") {
                        description = "你内心有较强的情绪波动，容易对不公或挫折产生强烈的情绪反应。学会管理情绪对你很重要。";
                    } else if (activeTraitNames[0] === "暴食") {
                        description = "你对物质或精神享受有较强的渴望，喜欢追求满足感。适度追求享受是生活的调味剂。";
                    }
                } else {
                    personalityType = `${activeTraitNames.join('+')}复合型`;
                    description = `你的人格是${activeTraitNames.join('和')}的复合型，这些特质共同塑造了你独特的性格。`;
                    
                    if (activeTraitNames.includes("忧郁") && activeTraitNames.includes("欲望")) {
                        description = "你是一个内心充满矛盾的人，既有强烈的追求和目标，又时常感到忧郁和迷茫。这种特质组合使你成为一个深刻的思想者。";
                    } else if (activeTraitNames.includes("傲慢") && activeTraitNames.includes("嫉妒")) {
                        description = "你既有自信和优越感，又容易与他人比较，这种特质组合可能使你时而自信满满，时而感到不安。";
                    } else if (activeTraitNames.includes("忧郁") && activeTraitNames.includes("暴食")) {
                        description = "你常常感到忧郁，但也会通过追求物质或精神享受来缓解这种情绪。你的情感世界丰富而复杂。";
                    }
                }
            }
            
            personalityTypeElement.textContent = personalityType;
            personalityDescriptionElement.textContent = description;
            
            const imageUrl = PERSONALITY_IMAGES[personalityType] || PERSONALITY_IMAGES["默认图片"];
            
            if (imageUrl) {
                personalityImage.src = imageUrl;
                personalityImage.alt = `${personalityType} 人格类型图片`;
                imageContainer.style.display = 'block';
                
                // 添加图片加载失败的备用方案
                personalityImage.onerror = function() {
                    this.src = "images/balanced.jpg";
                };
            } else {
                imageContainer.style.display = 'none';
            }
        }

        function restartTest() {
            currentQuestion = 0;
            userAnswers = new Array(questions.length).fill(null);
            resultPage.classList.remove('active');
            quizPage.classList.add('active');
            showQuestion(currentQuestion);
        }

        function backToHome() {
            resultPage.classList.remove('active');
            homePage.classList.add('active');
        }
    </script>
</body>
</html>
